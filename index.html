<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Controla tus reparaciones y tus ingresos técnicos de forma local y sencilla.">
    <title>Control de Reparaciones</title>

    <!-- ==========================================
         ICONOS Y MANIFEST (Configuración PWA)
         ========================================== -->
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">
    <link rel="apple-touch-icon" href="assets/images/logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Reparaciones">

    <!-- ==========================================
         DEPENDENCIAS EXTERNAS
         ========================================== -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-title">
                <h1>Mis Reparaciones</h1>
                <p>Control de ingresos técnicos</p>
            </div>
            <button class="theme-toggle" id="themeBtn" title="Cambiar tema">
                <svg id="themeIcon" viewBox="0 0 24 24"></svg>
            </button>
        </header>

        <div class="file-status" id="fileStatus">
            <span style="display:inline-block; width:8px; height:8px; background:#10b981; border-radius:50%;"></span>
            Aplicación nativa (Datos Seguros)
        </div>

        <div class="card stats-grid">
            <div class="stat-box">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <div class="stat-label">Este Mes</div>
                <div class="stat-value" id="monthTotal">$0</div>
            </div>
            <div class="stat-box accent">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                </svg>
                <div class="stat-label">Promedio (meses activos)</div>
                <div class="stat-value" id="monthlyAverage">$0</div>
            </div>
        </div>

        <div class="card">
            <form id="repairForm">
                <div class="form-group">
                    <label for="amount">
                        <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 002-2H5a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                        Monto Ganado ($)
                    </label>
                    <input type="number" id="amount" placeholder="Ej: 15000" required inputmode="decimal" min="0.01"
                        max="999999999.99" step="0.01">
                </div>

                <div class="form-group">
                    <label for="description">
                        <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                        </svg>
                        Descripción
                    </label>
                    <input type="text" id="description" placeholder="Ej: Cambio de SSD / Limpieza">
                </div>

                <div class="form-group">
                    <label for="date">
                        <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v14a2 2 0 002 2z" />
                        </svg>
                        Fecha
                    </label>
                    <input type="date" id="date" required>
                </div>

                <div id="feedbackMessage" class="feedback-message" role="status" aria-live="polite"></div>

                <button type="submit" class="btn-submit">
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    Guardar Trabajo
                </button>
            </form>
        </div>

        <div class="card">
            <div class="history-header">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                </svg>
                <div class="history-title">Últimos trabajos registrados</div>
            </div>
            <div id="historyFeedback" class="history-feedback" aria-live="polite"></div>
            <div class="list-container" id="historyList"></div>
        </div>

        <div class="file-actions-area">
            <button class="file-label-btn" id="dataActionsBtn">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 4v16m0 0l-4-4m4 4l4-4M12 4l-4 4m4-4l4 4" />
                </svg>
                <span>Importar/Exportar datos...</span>
            </button>
            <input type="file" id="importBackupInput" accept="application/json,.json" hidden>
        </div>

        <footer class="app-footer">
            <div class="footer-brand" aria-label="Marca de Agustín Comolli">
                <img src="assets/images/logo-brand.png" alt="Logo de Agustín Comolli" class="footer-brand__logo">
                <div class="footer-brand__text">
                    <span class="footer-brand__title">Diseñado por</span>
                    <span class="footer-brand__name">Agustín Comolli</span>
                </div>
            </div>
        </footer>
    </div>

    <div id="feedbackModal" class="feedback-modal" aria-hidden="true">
        <div class="feedback-modal-content" role="dialog" aria-modal="true" aria-labelledby="feedbackModalTitle">
            <h3 id="feedbackModalTitle">Aviso</h3>
            <p id="feedbackModalMessage"></p>
            <div class="feedback-modal-actions">
                <button id="feedbackModalCancel" class="feedback-modal-cancel">Cancelar</button>
                <button id="feedbackModalConfirm" class="feedback-modal-confirm">Aceptar</button>
            </div>
        </div>
    </div>

    <div id="dataActionsModal" class="feedback-modal" aria-hidden="true">
        <div class="feedback-modal-content" role="dialog" aria-modal="true" aria-labelledby="dataActionsModalTitle">
            <h3 id="dataActionsModalTitle">Importar o exportar datos</h3>
            <p>Elegí la acción que querés realizar con tus registros.</p>
            <div class="data-actions-list">
                <button class="data-action-btn" id="exportJsonBtn">
                    <span>Exportar respaldo (.json)</span>
                </button>
                <button class="data-action-btn" id="importJsonBtn">
                    <span>Importar respaldo (.json)</span>
                </button>
                <button class="data-action-btn" id="exportExcelBtn">
                    <span>Exportar a Excel (.xlsx)</span>
                </button>
            </div>
            <div class="feedback-modal-actions">
                <button id="dataActionsCancel" class="feedback-modal-cancel">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="scripts/app.js"></script>
</body>

</html>
